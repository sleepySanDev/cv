<!DOCTYPE html>
<html lang="en">
<head>

    <title>Hello World | My CV Website</title>
    <style>
        /* This makes the page look clean, modern, and centered */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
